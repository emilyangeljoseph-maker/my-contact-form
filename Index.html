<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Form with Auto-Responder</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        form {
            max-width: 500px;
            width: 100%;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        input[type="submit"] {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- Fixed action URL with your email included correctly -->
    <form id="contactForm" action="https://formsubmit.co/emilyangeljoseph@gmail.com" method="POST">
        
        <!-- 1. Turn off captcha for instant redirects -->
        <input type="hidden" name="_captcha" value="false">

        <!-- 2. This creates the auto-responder back to the user -->
        <input type="hidden" name="_autoresponse" value="Thank you for reaching out! We have received your message and will get back to you shortly.">

        <label for="fname">Display name:</label>
        <input type="text" id="fname" name="Display Name" required>

        <label for="iname">Email Address:</label>
        <!-- CRITICAL: Name must be exactly "email" for the autoresponder to work -->
        <input type="email" id="iname" name="email" required>

        <label for="qname">Question:</label>
        <textarea id="qname" name="Question" required></textarea>

        <input type="submit" value="Submit">
    </form>

    <p>The form data will be sent to your inbox, and an automatic confirmation will be sent to the user.</p>

    <!-- 3. Optional JavaScript to alert the user on screen as well -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function() {
            alert("Form submitted! A confirmation email has been sent to your email address.");
        });
    </script>

</body>
</html>
